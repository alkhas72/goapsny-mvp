[functions.auth-telegram]
verify_jwt = false

[functions.ai-autofill]
verify_jwt = true

[functions.export-drive]
verify_jwt = false

# auth-telegram валидирует подпись initData токеном бота и подписывает JWT
# секретом проекта. Локально оба пробрасываются из окружения CLI (env(...)):
# перед `supabase start` задайте TELEGRAM_BOT_TOKEN и SUPABASE_JWT_SECRET
# (для e2e — тестовые значения, боевые сюда не вписывать). Имя EDGE_JWT_SECRET,
# а не SUPABASE_JWT_SECRET: CLI не отдаёт функциям пользовательские секреты
# с префиксом SUPABASE_. Без переменных стек поднимается, но функция честно
# отвечает Missing env.
[edge_runtime.secrets]
TELEGRAM_BOT_TOKEN = "env(TELEGRAM_BOT_TOKEN)"
EDGE_JWT_SECRET = "env(SUPABASE_JWT_SECRET)"

[auth.email]
# Клиент ждёт ровно 8 цифр (publicAuth.ts: OTP_CODE_LENGTH = 8, ^\d{8}$).
# Дефолт Supabase — 6, при нём код не пройдёт валидацию на клиенте.
otp_length = 8
otp_expiry = 3600

# Тело письма — supabase/templates/otp.html, версионируется в репозитории.
# Оно ОБЯЗАНО содержать {{ .Token }}: клиент ждёт восьмизначный код и ссылку
# не обрабатывает вовсе.
#
# Автоприменение через content_path намеренно НЕ включено: Supabase CLI 2.104
# монтирует указанный путь как директорию, и вместо письма уходит листинг
# каталога — проверено 20.07 на локальном стеке (тема применяется, тело нет),
# на трёх разных расположениях файла. Пока поведение не проверено на свежей
# версии CLI, шаблон переносится в дашборд вручную.
#
# Это известный долг, а не норма: конфигурация, живущая только в дашборде,
# невоспроизводима локально и теряется при пересоздании проекта. Именно так
# и вышло 19.07 — правки существовали лишь в настройках production.
#
# На production rujxthjaquvwbdnrftua шаблоны Magic link и Confirm signup
# приведены к supabase/templates/otp.html вручную 19.07.

[db.seed]
# If enabled, seeds the database after migrations during a db reset.
enabled = true
# Load-bearing for submit_public_place: methodology.sql provides the
# accessibility_statuses row 'gray' that places.status FKs to; categories.sql
# provides the active slugs the RPC's C.5 guard accepts.
sql_paths = ["./seed/categories.sql", "./seed/methodology.sql"]
